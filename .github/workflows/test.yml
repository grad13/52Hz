name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            code/app/tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('code/app/tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-
      - name: Unit tests
        run: cd code/app/tauri && cargo test --lib
      - name: Integration tests
        run: cd code/app/tauri && cargo test --test app_lifecycle -- --test-threads=1

  frontend-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: cd code/app && npm ci
      - name: Type check
        run: cd code/app && npx svelte-check
